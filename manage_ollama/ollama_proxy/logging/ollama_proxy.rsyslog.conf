# Rsyslog configuration for Ollama Proxy
# 
# This configuration file routes ollama_proxy logs to a separate file from syslog.
# The application sends logs to syslog facility LOG_LOCAL7.
#
# Installation instructions:
# 1. Copy this file to /etc/rsyslog.d/ollama_proxy.conf
# 2. Restart rsyslog: sudo systemctl restart rsyslog
# 3. Logs will be written to /var/log/ollama_proxy.log
#
# Note: This must be added BEFORE the default rsyslog rules that catch everything.
# Rsyslog processes rules in order of filenames in /etc/rsyslog.d/

# Route LOG_LOCAL7 facility to a separate file
local7.* /var/log/ollama_proxy.log

# Optionally, prevent LOG_LOCAL7 messages from being logged to the main syslog
# Uncomment the line below to stop LOG_LOCAL7 messages from appearing in /var/log/syslog
# local7.* ~

# For debugging: you can also create a separate file for different log levels
# local7.err /var/log/ollama_proxy_errors.log
