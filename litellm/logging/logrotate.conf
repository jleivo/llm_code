# Logrotate configuration for sync_ollama_litellm logs
# Place this file in /etc/logrotate.d/sync_ollama_litellm

/var/log/sync_ollama_litellm.log {
    daily
    rotate 7
    compress
    delaycompress
    missingok
    notifempty
    create 0644 root root
    postrotate
        /usr/bin/systemctl reload rsyslog > /dev/null 2>&1 || true
    endscript
}